name: Create Admin Setup Issues

on:
  workflow_dispatch:  # Manual trigger
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  create-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Create Admin Setup Milestones & Issues
        run: |
          python3 scripts/github-projects/create-admin-issues.py \
            --repo ${{ github.repository }} \
            --token ${{ secrets.GITHUB_TOKEN }}
      
      - name: Admin Project Board (manual setup required)
        run: |
          echo "📊 GitHub Projects v2 board creation requires a repo-owner node ID that"
          echo "   the default GITHUB_TOKEN cannot resolve for organization-owned repos,"
          echo "   so this step is manual:"
          echo ""
          echo "1. Go to: https://github.com/${{ github.repository }}/projects"
          echo "2. Click 'New project' → choose 'Table' view"
          echo "3. Name: 'SOCVault - Admin Setup'"
          echo "4. Description: 'Phase 0-2: Admin infrastructure & core management features.'"
          echo ""
          echo "🏷️  Add custom fields:"
          echo "  • Story Points (number)"
          echo "  • Status (single select: Backlog, In Progress, In Review, Done)"
          echo "  • Assigned Team (text)"

      - name: Post Workflow Summary
        run: |
          echo "✅ Admin Setup Issues Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Created 12 milestones (M0.1-M1.6)" >> $GITHUB_STEP_SUMMARY
          echo "- Created 15 user stories (US-ADM-001 to US-ADM-015)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Create the GitHub Projects board manually: [GitHub Projects](https://github.com/${{ github.repository }}/projects)" >> $GITHUB_STEP_SUMMARY
          echo "2. Configure board columns: Backlog → In Progress → In Review → Done (Sprint) → Done (All)" >> $GITHUB_STEP_SUMMARY
          echo "3. Set up automation: Issues labeled with milestone auto-move to \"In Progress\"" >> $GITHUB_STEP_SUMMARY
          echo "4. Add custom fields: Story Points, Priority, Risk Level" >> $GITHUB_STEP_SUMMARY
          echo "5. Start sprint: Move M0.1 stories to \"In Progress\"" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Assigned To" >> $GITHUB_STEP_SUMMARY
          echo "- **Phase 0 Infrastructure**: DevOps Agent" >> $GITHUB_STEP_SUMMARY
          echo "- **Phase 1A API & Core**: Backend Agent + Frontend Agent" >> $GITHUB_STEP_SUMMARY
